server:
  port: 8082

spring:
  application:
    name: ticket
  datasource:
    url: jdbc:mysql://localhost:3306/consultoria_ticket?createDatabaseIfNotExist=true
    username: root
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Configuración para habilitar y registrar en Eureka Server
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Configuración para personalizar la ruta de Swagger UI (Opcional)
springdoc:
  api-docs:
    enabled: true
    version: openapi-3-0
  swagger-ui:
    enabled: true