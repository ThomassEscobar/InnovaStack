server:
  port: 8010

spring:
  application:
    name: gateway

  cloud:
    gateway:
      mvc:
        routes:

          # AUTENTICACION
          - id: servicio-autenticacion
            uri: http://localhost:8080
            predicates:
              - Path=/autenticacion/**

          # CLIENTES
          - id: servicio-cliente
            uri: http://localhost:8081
            predicates:
              - Path=/clientes/**

          # TICKETS
          - id: servicio-tickets
            uri: http://localhost:8082
            predicates:
              - Path=/tickets/**

          # PROYECTOS
          - id: servicio-proyectos
            uri: http://localhost:8083
            predicates:
              - Path=/proyectos/**

          # REUNIONES
          - id: servicio-reuniones
            uri: http://localhost:8084
            predicates:
              - Path=/reuniones/**

          # FACTURACION
          - id: servicio-facturas
            uri: http://localhost:8085
            predicates:
              - Path=/facturas/**

          # REPORTES
          - id: servicio-reportes
            uri: http://localhost:8086
            predicates:
              - Path=/reportes/**

          # AUDITORIA
          - id: servicio-auditoria
            uri: http://localhost:8087
            predicates:
              - Path=/auditorias/**

          # NOTIFICACIONES
          - id: servicio-notificaciones
            uri: http://localhost:8088
            predicates:
              - Path=/notificaciones/**